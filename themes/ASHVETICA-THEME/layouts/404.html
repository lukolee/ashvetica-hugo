<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
    {{- partial "head.html" . -}}
    <body>
        {{- partial "header.html" . -}}
        <main style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 200px); text-align: center;">
            <div>
                <h1 style="font-size: 4rem; margin-bottom: 1rem;">404</h1>
                <p style="margin-bottom: 1rem;">The page you're looking for doesn't exist or has been moved.</p>
                <p>
                    <a href="{{ "/" | relURL }}" style="text-decoration: underline;">Return to home</a>
                </p>
            </div>
        </main>
        {{- partial "footer.html" . -}}
    </body>
</html>
